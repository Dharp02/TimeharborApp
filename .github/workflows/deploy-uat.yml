name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'timeharbourapp/**'
      - 'ecosystem.uat.config.js'
      - 'ecosystem.config.js'

jobs:
  deploy:
    name: Deploy Frontend - ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: DEV
            host_secret: DEV_FRONTEND_HOST
            port: 2011
            pm2_config: ecosystem.uat.config.js
          - env: PROD
            host_secret: PROD_FRONTEND_HOST
            port: 2007
            pm2_config: ecosystem.uat.config.js

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ matrix.port }} ${{ secrets[matrix.host_secret] }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to ${{ matrix.env }}
        run: |
          ssh -p ${{ matrix.port }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets[matrix.host_secret] }} << 'EOF'
            set -e

            cd /home/pdharamkar/TimeharborApp

            echo "� Stashing local changes..."
            STASHED=false
            if ! git diff --quiet || ! git diff --cached --quiet; then
              git stash push -m "deploy-auto-stash"
              STASHED=true
            fi

            echo "🛑 Stopping PM2 services..."
            sudo pm2 stop all || true

            echo "🔄 Fetching and pulling latest code from main..."
            git fetch origin
            git pull origin main
            git submodule update --init --recursive

            echo "⚙️  Installing dependencies for timeharbourapp..."
            cd timeharbourapp
            sudo npm install

            echo "🏗️  Building Next.js frontend..."
            sudo npm run build

            echo "🚀 Restarting PM2 frontend on port 80..."
            sudo pm2 restart timeharbor-frontend --update-env 2>/dev/null || \
              sudo pm2 start node_modules/.bin/next --name timeharbor-frontend -- start -p 80 -H 0.0.0.0
            sudo pm2 save
            cd ..

            if [ "$STASHED" = true ]; then
              echo "📦 Restoring stashed changes..."
              git stash pop || echo "⚠️  Stash pop had conflicts, manual resolution needed"
            fi

            echo "✅ ${{ matrix.env }} deployment completed!"
            sudo pm2 status
          EOF

      - name: Deployment Status
        if: failure()
        run: echo "❌ ${{ matrix.env }} deployment failed!"
