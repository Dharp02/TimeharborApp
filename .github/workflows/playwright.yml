name: Playwright Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'timeharbourapp/**'
  push:
    branches:
      - main
    paths:
      - 'timeharbourapp/**'

jobs:
  test:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: timeharbourapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: timeharbourapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create .env.local
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}
        run: |
          cat > .env.local <<EOF
          NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
          CAPACITOR_MODE=dev
          CAPACITOR_DEV_SERVER_URL=http://localhost:3000
          CAPACITOR_APP_ID=os.mieweb.timeharbor
          CAPACITOR_APP_NAME=TimeHarbor
          EOF

      - name: Run Playwright tests
        run: npm test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: timeharbourapp/playwright-report/
          retention-days: 14

      - name: Upload test results (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: timeharbourapp/test-results/
          retention-days: 7
